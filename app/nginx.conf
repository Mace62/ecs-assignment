server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check — works at /health (no static file needed)
    location = /health {
        default_type application/json;
        access_log off;
        return 200 '{"status":"ok"}';
    }

    # Static assets (hashed JS/CSS) — serve as-is
    location /static/ {
        try_files $uri =404;
    }

    # SPA routing — everything else falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}